apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cicd-app
  template:
    metadata:
      labels:
        app: cicd-app
    spec:
      containers:
        - name: cicd-app
          image: cicd-mini-project:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000